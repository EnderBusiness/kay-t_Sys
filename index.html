    <meta charset="UTF-8">
    <title>Sıfırdan Kayıt Sistemi</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; text-align: center; }
        input { display: block; width: 250px; padding: 10px; margin: 10px auto; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #00cf5d; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Yeni Kayıt</h2>
        <input type="email" id="userEmail" placeholder="E-posta">
        <input type="password" id="userPass" placeholder="Şifre">
        <button id="btnKayit">Kayıt Ol</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Senin güncel Firebase bilgilerini buraya koydum
        const firebaseConfig = {
            apiKey: "AIzaSyAGwWXf-aBMMW7qcEQi1lwL4rntbszL5cg",
            authDomain: "ender-0001-29028.firebaseapp.com",
            projectId: "ender-0001-29028",
            storageBucket: "ender-0001-29028.firebasestorage.app",
            messagingSenderId: "726073091078",
            appId: "1:726073091078:web:b5b18465bdaac4952b0f87"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById("btnKayit").addEventListener("click", async () => {
            const email = document.getElementById("userEmail").value;
            const pass = document.getElementById("userPass").value;

            try {
                const user = await createUserWithEmailAndPassword(auth, email, pass);
                alert("BAŞARILI: " + user.user.email);
            } catch (error) {
                alert("HATA: " + error.message);
            }
        });
    </script>
</body>
</html>
